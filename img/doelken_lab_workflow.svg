<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Dölken lab website workflow</title>
<desc>Flowchart showing how the lab website is built in R/Quarto, version controlled in GitHub, and published via GitHub Pages with a custom domain through Cloudflare and INWX.</desc>

<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; fill: #444; }
  .arr { stroke: #888; stroke-width: 1.5; fill: none; }
  .leader { stroke: #bbb; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
  .purple-box { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
  .teal-box   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
  .coral-box  { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.5; }
  .amber-box  { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
  .purple-title { fill: #3C3489; }
  .purple-sub   { fill: #534AB7; }
  .teal-title   { fill: #085041; }
  .teal-sub     { fill: #0F6E56; }
  .coral-title  { fill: #712B13; }
  .coral-sub    { fill: #993C1D; }
  .amber-title  { fill: #633806; }
  .amber-sub    { fill: #854F0B; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Row 1: Authoring -->
<text class="ts" x="340" y="28" text-anchor="middle">Authoring</text>
<line x1="40" y1="36" x2="160" y2="36" class="leader"/>
<line x1="520" y1="36" x2="640" y2="36" class="leader"/>

<rect class="purple-box" x="60" y="44" width="160" height="56" rx="8"/>
<text class="th purple-title" x="140" y="68" text-anchor="middle" dominant-baseline="central">QMD files</text>
<text class="ts purple-sub" x="140" y="86" text-anchor="middle" dominant-baseline="central">Edited in RStudio</text>

<line x1="220" y1="72" x2="258" y2="72" class="arr" marker-end="url(#arrow)"/>

<rect class="purple-box" x="260" y="44" width="160" height="56" rx="8"/>
<text class="th purple-title" x="340" y="68" text-anchor="middle" dominant-baseline="central">quarto render</text>
<text class="ts purple-sub" x="340" y="86" text-anchor="middle" dominant-baseline="central">Generates docs/ folder</text>

<line x1="420" y1="72" x2="458" y2="72" class="arr" marker-end="url(#arrow)"/>

<rect class="purple-box" x="460" y="44" width="160" height="56" rx="8"/>
<text class="th purple-title" x="540" y="68" text-anchor="middle" dominant-baseline="central">HTML output</text>
<text class="ts purple-sub" x="540" y="86" text-anchor="middle" dominant-baseline="central">Static site in docs/</text>

<line x1="540" y1="100" x2="540" y2="148" class="arr" marker-end="url(#arrow)"/>
<line x1="140" y1="100" x2="140" y2="148" class="arr" marker-end="url(#arrow)"/>

<!-- Row 2: Version Control -->
<text class="ts" x="340" y="136" text-anchor="middle">Version control</text>
<line x1="40" y1="144" x2="120" y2="144" class="leader"/>
<line x1="560" y1="144" x2="640" y2="144" class="leader"/>

<rect class="teal-box" x="60" y="152" width="180" height="56" rx="8"/>
<text class="th teal-title" x="150" y="176" text-anchor="middle" dominant-baseline="central">git add / commit</text>
<text class="ts teal-sub" x="150" y="194" text-anchor="middle" dominant-baseline="central">Track all changes</text>

<line x1="240" y1="180" x2="278" y2="180" class="arr" marker-end="url(#arrow)"/>

<rect class="teal-box" x="280" y="152" width="160" height="56" rx="8"/>
<text class="th teal-title" x="360" y="176" text-anchor="middle" dominant-baseline="central">git push</text>
<text class="ts teal-sub" x="360" y="194" text-anchor="middle" dominant-baseline="central">Syncs to GitHub</text>

<line x1="440" y1="180" x2="478" y2="180" class="arr" marker-end="url(#arrow)"/>

<rect class="teal-box" x="480" y="152" width="140" height="56" rx="8"/>
<text class="th teal-title" x="550" y="176" text-anchor="middle" dominant-baseline="central">GitHub repo</text>
<text class="ts teal-sub" x="550" y="194" text-anchor="middle" dominant-baseline="central">doelken/doelken-lab</text>

<line x1="550" y1="208" x2="550" y2="256" class="arr" marker-end="url(#arrow)"/>

<!-- Row 3: Publishing -->
<text class="ts" x="340" y="244" text-anchor="middle">Publishing</text>
<line x1="40" y1="252" x2="120" y2="252" class="leader"/>
<line x1="560" y1="252" x2="640" y2="252" class="leader"/>

<rect class="coral-box" x="420" y="260" width="180" height="56" rx="8"/>
<text class="th coral-title" x="510" y="284" text-anchor="middle" dominant-baseline="central">GitHub Pages</text>
<text class="ts coral-sub" x="510" y="302" text-anchor="middle" dominant-baseline="central">Serves docs/ folder</text>

<line x1="510" y1="316" x2="510" y2="364" class="arr" marker-end="url(#arrow)"/>

<!-- Row 4: Domain -->
<text class="ts" x="340" y="352" text-anchor="middle">Domain &amp; DNS</text>
<line x1="40" y1="360" x2="100" y2="360" class="leader"/>
<line x1="580" y1="360" x2="640" y2="360" class="leader"/>

<rect class="amber-box" x="60" y="368" width="140" height="56" rx="8"/>
<text class="th amber-title" x="130" y="392" text-anchor="middle" dominant-baseline="central">INWX</text>
<text class="ts amber-sub" x="130" y="410" text-anchor="middle" dominant-baseline="central">Owns doelkenlab.de</text>

<line x1="200" y1="396" x2="238" y2="396" class="arr" marker-end="url(#arrow)"/>

<rect class="amber-box" x="240" y="368" width="160" height="56" rx="8"/>
<text class="th amber-title" x="320" y="392" text-anchor="middle" dominant-baseline="central">Cloudflare</text>
<text class="ts amber-sub" x="320" y="410" text-anchor="middle" dominant-baseline="central">DNS, CDN, HTTPS</text>

<line x1="400" y1="396" x2="438" y2="396" class="arr" marker-end="url(#arrow)"/>

<rect class="amber-box" x="440" y="368" width="180" height="56" rx="8"/>
<text class="th amber-title" x="530" y="392" text-anchor="middle" dominant-baseline="central">doelkenlab.de</text>
<text class="ts amber-sub" x="530" y="410" text-anchor="middle" dominant-baseline="central">Live for visitors</text>

<!-- Legend -->
<rect x="60" y="460" width="14" height="14" rx="3" fill="#AFA9EC"/>
<text class="ts" x="82" y="471">Authoring (R/Quarto)</text>
<rect x="220" y="460" width="14" height="14" rx="3" fill="#5DCAA5"/>
<text class="ts" x="242" y="471">Version control (Git/GitHub)</text>
<rect x="420" y="460" width="14" height="14" rx="3" fill="#F0997B"/>
<text class="ts" x="442" y="471">Publishing</text>
<rect x="520" y="460" width="14" height="14" rx="3" fill="#FAC775"/>
<text class="ts" x="542" y="471">Domain</text>

</svg>
